version: '2.4'

services:
  # Aplicação Laravel PHP
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - laravel_network
    depends_on:
      - mysql
      - redis
      - rustfs

  # Servidor Nginx
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - app

  # Banco de Dados MySQL
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_network

  # Redis para Cache e Filas
  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel_network
    command: redis-server --appendonly yes

  # Mailpit - Servidor de Email para Testes
  mailpit:
    image: axllent/mailpit:latest
    container_name: laravel_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - laravel_network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: laravel_rustfs
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # Credenciais
      - RUSTFS_ACCESS_KEY=laravel
      - RUSTFS_SECRET_KEY=laravel123

      # Volumes
      - RUSTFS_VOLUMES=/data

      # Endereços - ESSENCIAL: 0.0.0.0 para escutar em todas interfaces
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001

      # Habilitar console
      - RUSTFS_CONSOLE_ENABLE=true

      # CORS - permite acesso de qualquer origem
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*

      # Domínios permitidos
      - RUSTFS_SERVER_DOMAINS=localhost:9000

      # Logs
      - RUSTFS_LOG_LEVEL=info
    volumes:
      - rustfs_data:/data
    networks:
      - laravel_network
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:9000/health && curl -f http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # Worker para filas do Laravel (NOME ALTERADO para evitar conflito)
  queue_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_queue_worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - laravel_network
    depends_on:
      - redis
      - mysql
    command: php artisan queue:work --tries=3

  # Vite para desenvolvimento frontend
  vite:
    image: node:22-alpine
    container_name: laravel_vite
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"  # Porta padrão do VITE
      - "5174:5174"  # Porta alternativa para hot-reload
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true  # ESSENCIAL para hot-reload no Docker
      - WATCHPACK_POLLING=true     # Alternativa para watch
    networks:
      - laravel_network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app

volumes:
  mysql_data:
  redis_data:
  rustfs_data:

networks:
  laravel_network:
    driver: bridge
